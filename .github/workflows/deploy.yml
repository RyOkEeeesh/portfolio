name: Deploy to GitHub Pages

on:
  # mainブランチにプッシュされたときに実行
  push:
    branches: [ main ]
  # GitHub上のActionsタブから手動で実行できるようにする設定
  workflow_dispatch:

# GitHub Actionsにページのデプロイを許可する権限設定
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # 🛠️ 追加：Node.js v22 を明示的にインストールする設定
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # npmを使用している場合のキャッシュ有効化（pnpm/yarnなら適宜変更）

      - name: Install, build, and upload your site
        uses: withastro/action@v3 # Nodeが入っていればそれを使ってビルドしてくれます