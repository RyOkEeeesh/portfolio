name: Deploy to GitHub Pages

on:
  # mainブランチにプッシュされたときに実行
  push:
    branches: [ main ]
  # GitHub上のActionsタブから手動で実行できるようにする設定
  workflow_dispatch:

# GitHub Actionsにページのデプロイを許可する権限設定
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # 1. 明示的に Node.js v22 をインストール
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # pnpmやyarnを使っている場合はここを変更

      # 2. 依存パッケージのインストール
      - name: Install dependencies
        run: npm ci # もしくは npm install

      # 3. Astroのビルドを実行
      - name: Build site
        run: npm run build

      # 4. ビルドされた静的ファイルをPages用にアップロード
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Astroのデフォルト出力先

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4